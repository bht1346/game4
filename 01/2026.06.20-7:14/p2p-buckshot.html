<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>恶魔轮盘赌 · P2P 联机版</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #0a0a0a;
            color: #ddd;
            font-family: "Courier New", monospace;
            max-width: 820px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            line-height: 1.6;
        }
        h1 { color: #ffcc00; text-align: center; letter-spacing: 3px; margin: 18px 0 4px; }
        .subtitle { text-align: center; color: #888; margin-bottom: 18px; font-size: 14px; }
        .panel {
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 18px; margin-bottom: 14px; box-shadow: 0 0 24px rgba(0,0,0,.6);
        }
        .center { text-align: center; }
        .room-code {
            font-size: 42px; color: #ffcc00; letter-spacing: 12px;
            font-weight: 900; text-align: center; margin: 14px 0;
            text-shadow: 0 0 18px rgba(255,204,0,.2);
        }
        .room-code-hint { text-align: center; color: #888; font-size: 13px; margin-bottom: 16px; }
        .row { display: flex; gap: 10px; margin: 12px 0; align-items: center; flex-wrap: wrap; }
        .row label { display: block; color: #aaa; font-size: 14px; margin-bottom: 4px; width: 100%; }
        .row input {
            flex: 1; min-width: 160px; background: #0d0d0d; color: #eee;
            border: 1px solid #555; border-radius: 6px; padding: 10px;
            font-family: inherit; font-size: 16px; text-align: center;
            letter-spacing: 6px; font-weight: 700;
        }
        .row input::placeholder { letter-spacing: 2px; font-weight: 400; color: #666; }
        .status-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 6px; }
        .status-dot.waiting { background: #ffcc00; animation: blink 1s infinite; }
        .status-dot.ok { background: #44ff44; }
        .status-dot.fail { background: #ff4444; }
        @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: .3; } }
        button {
            background: #252525; color: #eee; border: 1px solid #555;
            padding: 10px 22px; border-radius: 6px; cursor: pointer;
            font-family: inherit; font-size: 16px; transition: all .15s;
            flex: 0 1 auto; min-width: 80px;
        }
        button:hover:not(:disabled) { background: #3a3a3a; border-color: #aaa; transform: scale(1.02); }
        button:disabled { opacity: .35; cursor: not-allowed; transform: none; }
        .success { border-color: #44aa44; color: #77ff77; }
        .success:hover:not(:disabled) { background: #113311; border-color: #55ff55; }
        .danger { border-color: #aa4444; color: #ff7777; }
        .danger:hover:not(:disabled) { background: #441111; border-color: #ff5555; }
        .warn { border-color: #ccaa44; color: #ffdd77; }
        .warn:hover:not(:disabled) { background: #332a11; border-color: #ffdd55; }
        .btn-row { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 6px; }
        #status {
            background: #0d0d0d; border-left: 4px solid #ffcc00; border-radius: 8px;
            padding: 14px 16px; white-space: pre-wrap; word-break: break-word;
            min-height: 100px; margin-bottom: 12px; font-size: 15px;
        }
        #log {
            background: #070707; border: 1px solid #2a2a2a; border-radius: 8px;
            height: 220px; overflow-y: auto; padding: 12px 14px;
            white-space: pre-wrap; word-break: break-word; font-size: 14px;
        }
        #log::-webkit-scrollbar { width: 6px; }
        #log::-webkit-scrollbar-track { background: #1a1a1a; }
        #log::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }
        .hidden { display: none; }
        .highlight { color: #ffcc00; }
        .info-text { color: #88ccff; }
        .success-text { color: #55ff55; }
        .danger-text { color: #ff5555; }
        .small { color: #888; font-size: 13px; }
        .tip {
            background: #101010; border: 1px dashed #555; border-radius: 8px;
            padding: 10px 12px; margin-top: 14px; color: #888; font-size: 13px;
            text-align: center;
        }
        .preset-section { margin-top: 18px; padding-top: 14px; border-top: 1px solid #222; }
        .preset-title { color: #aaa; font-size: 14px; margin-bottom: 10px; }
        .preset-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
        .preset-card {
            background: #151515; border: 1px solid #444; border-radius: 10px;
            padding: 14px; text-align: center; cursor: pointer;
            transition: all .15s; position: relative; overflow: hidden;
        }
        .preset-card::before {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,.04), transparent);
            transform: translateX(-120%); transition: transform .45s;
        }
        .preset-card:hover::before { transform: translateX(120%); }
        .preset-card:hover { border-color: #ffcc00; background: #1c1a0f; transform: translateY(-2px); }
        .preset-card .room-num { color: #ffcc00; font-size: 28px; font-weight: 900; letter-spacing: 4px; }
        .preset-card .room-label { color: #888; font-size: 12px; margin-top: 4px; }
        .preset-card .room-status { margin-top: 8px; }
        .preset-card .room-status .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }
        .preset-card .room-status .dot.empty { background: #666; }
        .preset-card .room-status .dot.active { background: #44ff44; animation: blink 1s infinite; }
    </style>
</head>
<body>
<h1>恶魔轮盘赌</h1>
<div class="subtitle">P2P 联机版：输入 6 位房间码即可对战</div>

<section class="panel" id="setup">
    <div class="row">
        <label>你的名字</label>
        <input id="my-name" maxlength="12" value="玩家">
    </div>
    <div class="row">
        <button class="success" id="btn-create">创建房间</button>
        <span style="flex:1"></span>
        <span class="small" style="align-self:center">或加入已有房间</span>
        <span style="flex:1"></span>
    </div>
    <div class="row" id="room-row">
        <label>房间码</label>
        <input id="room-code" maxlength="6" placeholder="6 位数字">
        <button class="warn" id="btn-join">加入房间</button>
    </div>
    <div id="waiting-area" style="display:none">
        <div class="room-code" id="display-code">------</div>
        <div class="room-code-hint">把这个 6 位房间码告诉朋友，等待对方加入</div>
        <div id="connect-status" style="text-align:center;margin:10px 0">
            <span class="status-dot waiting"></span>等待对方加入...
        </div>
        <div style="text-align:center">
            <button class="danger" id="btn-cancel">取消</button>
        </div>
    </div>
    <div class="preset-section">
        <div class="preset-title">默认房间 — 点击进入，第一个到的人成为房主</div>
        <div class="preset-grid" id="preset-grid"></div>
    </div>
    <div class="tip">双方输入同一个 6 位房间码即可连接，不需要复制长串代码。</div>
</section>

<section class="panel hidden" id="game">
    <div id="status">等待连接...</div>
    <div class="btn-row">
        <button class="danger" id="shoot-self">打自己</button>
        <button class="success" id="shoot-enemy">打对方</button>
        <button class="warn" id="next-round">进入下一局</button>
        <span id="item-buttons"></span>
    </div>
    <div id="log"></div>
</section>

<script>
    const els = {
        setup: document.getElementById('setup'),
        game: document.getElementById('game'),
        myName: document.getElementById('my-name'),
        roomRow: document.getElementById('room-row'),
        roomCode: document.getElementById('room-code'),
        waitingArea: document.getElementById('waiting-area'),
        displayCode: document.getElementById('display-code'),
        connectStatus: document.getElementById('connect-status'),
        status: document.getElementById('status'),
        log: document.getElementById('log'),
        shootSelf: document.getElementById('shoot-self'),
        shootEnemy: document.getElementById('shoot-enemy'),
        nextRound: document.getElementById('next-round'),
        itemButtons: document.getElementById('item-buttons'),
    };

    const ITEMS = ['辣条', '饮料', '手机'];
    const PREFIX = 'buckshot-';

    let peer = null;
    let conn = null;
    let role = null;
    let mySeat = null;
    let connected = false;
    let state = null;

    function safeName(name, fallback) {
        return (name || fallback).trim().slice(0, 12) || fallback;
    }

    function genCode() {
        return String(Math.floor(100000 + Math.random() * 900000));
    }

    function addLog(message, cls = '') {
        const line = document.createElement('div');
        line.textContent = message;
        if (cls) line.className = cls;
        els.log.appendChild(line);
        els.log.scrollTop = els.log.scrollHeight;
        while (els.log.children.length > 80) els.log.removeChild(els.log.firstChild);
    }

    function showGame() {
        els.setup.classList.add('hidden');
        els.game.classList.remove('hidden');
    }

    function send(message) {
        if (conn && conn.open) conn.send(JSON.stringify(message));
    }

    function broadcastState() {
        render();
        send({ type: 'state', state: publicState('p2') });
    }

    function broadcastLog(message, cls = '') {
        addLog(message, cls);
        send({ type: 'log', message, cls });
    }

    function rand(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function gcd(a, b) {
        a = Math.abs(a); b = Math.abs(b);
        while (b) [a, b] = [b, a % b];
        return a || 1;
    }

    function formatFraction(num, den) {
        const g = gcd(num, den);
        return `${num / g}/${den / g}`;
    }

    function makeBullets() {
        const total = rand(4, 10);
        const realCount = rand(1, total - 1);
        const bullets = [...Array(realCount).fill('real'), ...Array(total - realCount).fill('blank')];
        for (let i = bullets.length - 1; i > 0; i--) {
            const j = rand(0, i);
            [bullets[i], bullets[j]] = [bullets[j], bullets[i]];
        }
        return bullets;
    }

    function makeItems(round) {
        if (round < 2) return [];
        const pool = [...ITEMS];
        return Array.from({ length: 2 }, () => {
            const i = rand(0, pool.length - 1);
            return pool.splice(i, 1)[0];
        });
    }

    function newGame(hostName, guestName) {
        state = {
            round: 1, maxHp: 3,
            players: [
                { seat: 'p1', name: hostName, hp: 3, items: [] },
                { seat: 'p2', name: guestName, hp: 3, items: [] }
            ],
            bullets: makeBullets(), bulletIndex: 0, shotsFired: 0,
            turn: 'p1', roundOver: false, gameOver: false, nextFirst: null,
        };
    }

    function resetRound() {
        state.maxHp = state.round === 1 ? 3 : state.round === 2 ? 5 : 8;
        state.players.forEach(p => { p.hp = state.maxHp; p.items = makeItems(state.round); });
        state.bullets = makeBullets(); state.bulletIndex = 0; state.shotsFired = 0;
        state.turn = state.nextFirst || 'p1'; state.nextFirst = null;
        state.roundOver = false; state.gameOver = false;
    }

    function remainBullets() {
        const r = state.bullets.slice(state.bulletIndex);
        return { real: r.filter(x => x === 'real').length, blank: r.filter(x => x === 'blank').length, total: r.length };
    }

    function publicState(receiverSeat) {
        return {
            ...state, bulletsInfo: remainBullets(),
            fraction: formatFraction(state.shotsFired, state.bullets.length),
            players: state.players.map(p => ({
                seat: p.seat, name: p.name, hp: p.hp,
                items: p.seat === receiverSeat ? p.items : Array(p.items.length).fill('未知道具')
            })),
        };
    }

    function player(seat) { return state.players.find(p => p.seat === seat); }
    function opponent(seat) { return state.players.find(p => p.seat !== seat); }

    function render(externalState = null) {
        const view = externalState || publicState(mySeat);
        const me = view.players.find(p => p.seat === mySeat);
        const enemy = view.players.find(p => p.seat !== mySeat);
        const turnPlayer = view.players.find(p => p.seat === view.turn);
        const bullets = view.bulletsInfo || remainBullets();
        const fraction = view.fraction || formatFraction(view.shotsFired, view.bullets.length);
        const isMyTurn = view.turn === mySeat && !view.roundOver && !view.gameOver && connected;

        els.status.textContent =
            `【第${view.round}局】当前回合：${turnPlayer ? turnPlayer.name : '等待中'}\n` +
            `你：${me ? me.hp : '-'}血  对方：${enemy ? enemy.hp : '-'}血\n` +
            `分数：${fraction} | 剩余子弹：实弹${bullets.real}发 / 空弹${bullets.blank}发（合计${bullets.total}）\n` +
            `你的道具：${me && me.items.length ? me.items.join('、') : '无'}\n` +
            `${view.gameOver ? '游戏结束' : view.roundOver ? '本局结束' : isMyTurn ? '轮到你操作' : '等待对方操作'}`;

        els.shootSelf.disabled = !isMyTurn;
        els.shootEnemy.disabled = !isMyTurn;
        els.nextRound.disabled = !(role === 'host' && view.roundOver && !view.gameOver);

        els.itemButtons.innerHTML = '';
        if (isMyTurn && me) {
            me.items.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'warn';
                btn.textContent = `使用${item}`;
                btn.onclick = () => action({ type: 'useItem', item });
                els.itemButtons.appendChild(btn);
            });
        }
    }

    function fireShot() {
        if (state.bulletIndex >= state.bullets.length) {
            state.bullets = makeBullets(); state.bulletIndex = 0; state.shotsFired = 0;
            return 'reload';
        }
        let bullet = state.bullets[state.bulletIndex];
        if (state.bullets.length === 2 * state.shotsFired) bullet = 'real';
        state.bulletIndex++; state.shotsFired++;
        return bullet;
    }

    function action(message) {
        if (role === 'host') handleAction(mySeat, message);
        else send({ type: 'action', action: message });
    }

    function handleAction(seat, message) {
        if (role !== 'host' || !state || state.turn !== seat || state.roundOver || state.gameOver) return;
        const actor = player(seat);
        const enemy = opponent(seat);

        if (message.type === 'useItem') {
            const itemIndex = actor.items.indexOf(message.item);
            if (itemIndex === -1) return;
            if (message.item === '辣条') {
                if (actor.hp >= state.maxHp) return;
                actor.hp++; actor.items.splice(itemIndex, 1);
                broadcastLog(`${actor.name}吃了辣条，+1血`, 'success-text');
            }
            if (message.item === '饮料') {
                if (state.bulletIndex >= state.bullets.length) return;
                state.bulletIndex++; actor.items.splice(itemIndex, 1);
                broadcastLog(`${actor.name}喝了饮料，移除顶部一发子弹`, 'info-text');
            }
            if (message.item === '手机') {
                state.nextFirst = actor.seat; actor.items.splice(itemIndex, 1);
                broadcastLog(`${actor.name}使用手机，下局锁定先手`, 'info-text');
            }
            broadcastState(); return;
        }

        if (message.type !== 'shoot') return;
        const target = message.target === 'enemy' ? enemy : actor;
        broadcastLog(`${actor.name}朝${target === actor ? '自己' : enemy.name}开枪`, 'info-text');
        const result = fireShot();

        if (result === 'reload') {
            broadcastLog('弹巢已空，重新上弹。本次不造成伤害。', 'info-text');
            broadcastState(); return;
        }
        if (result === 'blank') {
            broadcastLog('空弹');
            if (target === actor) broadcastLog(`${actor.name}继续回合`, 'info-text');
            else { state.turn = enemy.seat; broadcastLog(`换手，轮到${enemy.name}`, 'info-text'); }
            broadcastState(); return;
        }

        target.hp = Math.max(0, target.hp - 1);
        broadcastLog(`${target.name}中弹，-1血`, target === actor ? 'danger-text' : 'success-text');

        if (target.hp <= 0) {
            if (target === actor) {
                state.roundOver = true; state.gameOver = true;
                broadcastLog(`${actor.name}倒下了，${enemy.name}获得最终胜利！`, 'danger-text');
            } else {
                state.roundOver = true;
                broadcastLog(`${enemy.name}被击倒，${actor.name}赢下这一局！`, 'success-text');
                if (state.round >= 3) { state.gameOver = true; broadcastLog(`${actor.name}连赢三局，彻底获胜！`, 'highlight'); }
            }
        } else {
            state.turn = enemy.seat;
            broadcastLog(`换手，轮到${enemy.name}`, 'info-text');
        }
        broadcastState();
    }

    function nextRound() {
        if (role !== 'host' || !state || !state.roundOver || state.gameOver) return;
        state.round++; resetRound();
        broadcastLog(`========== 第${state.round}局开始 ==========`, 'highlight');
        broadcastState();
    }

    function onConnect() {
        connected = true;
        showGame();
        addLog('P2P 连接成功，双方已就绪。', 'highlight');
        if (role === 'host') {
            newGame(safeName(els.myName.value, '房主'), '等待中...');
            send({ type: 'hello', name: safeName(els.myName.value, '房主') });
        } else {
            send({ type: 'hello', name: safeName(els.myName.value, '同学') });
        }
        render();
    }

    function bindConnection(connection) {
        conn = connection;
        conn.on('open', onConnect);
        conn.on('data', raw => {
            const msg = JSON.parse(raw);
            if (msg.type === 'hello' && role === 'host') {
                newGame(safeName(els.myName.value, '房主'), safeName(msg.name, '同学'));
                broadcastLog('双方到齐，对局开始！', 'highlight');
                broadcastState();
            }
            if (msg.type === 'state' && role === 'guest') render(msg.state);
            if (msg.type === 'log' && role === 'guest') addLog(msg.message, msg.cls || '');
            if (msg.type === 'action' && role === 'host') handleAction('p2', msg.action);
        });
        conn.on('close', () => { connected = false; addLog('连接已断开', 'danger-text'); render(); });
    }

    function destroyPeer() {
        if (peer) { peer.destroy(); peer = null; }
        conn = null; connected = false; role = null; mySeat = null; state = null;
        els.waitingArea.style.display = 'none';
        els.roomRow.style.display = 'flex';
    }

    function createRoom() {
        destroyPeer();
        const code = genCode();
        role = 'host'; mySeat = 'p1';

        els.roomRow.style.display = 'none';
        els.waitingArea.style.display = 'block';
        els.displayCode.textContent = code;
        els.connectStatus.innerHTML = '<span class="status-dot waiting"></span>等待对方加入...';

        peer = new Peer(PREFIX + code, { debug: 0 });
        peer.on('open', () => addLog(`房间 ${code} 已创建`, 'info-text'));
        peer.on('connection', connection => {
            bindConnection(connection);
            els.connectStatus.innerHTML = '<span class="status-dot ok"></span>对方已加入，正在连接...';
        });
        peer.on('error', err => {
            addLog(`房间错误：${err.type}`, 'danger-text');
            if (err.type === 'unavailable-id') addLog('房间码冲突，请重新创建。', 'danger-text');
        });
    }

    function joinRoom() {
        const code = els.roomCode.value.trim();
        if (!/^\d{6}$/.test(code)) { addLog('请输入 6 位数字房间码。', 'danger-text'); return; }
        destroyPeer();
        role = 'guest'; mySeat = 'p2';

        addLog(`正在加入房间 ${code}...`, 'info-text');
        peer = new Peer(undefined, { debug: 0 });
        peer.on('open', () => {
            const connection = peer.connect(PREFIX + code, { reliable: true });
            connection.on('open', () => {
                bindConnection(connection);
                addLog(`已加入房间 ${code}`, 'success-text');
            });
            connection.on('error', err => addLog(`连接失败：${err}`, 'danger-text'));
            setTimeout(() => {
                if (!connected) addLog('连接超时，请确认房间码正确且房主在线。', 'danger-text');
            }, 8000);
        });
        peer.on('error', err => addLog(`错误：${err.type}`, 'danger-text'));
    }

    document.getElementById('btn-create').onclick = createRoom;
    document.getElementById('btn-join').onclick = joinRoom;
    document.getElementById('btn-cancel').onclick = () => { destroyPeer(); addLog('已取消。', 'info-text'); };
    els.shootSelf.onclick = () => action({ type: 'shoot', target: 'self' });
    els.shootEnemy.onclick = () => action({ type: 'shoot', target: 'enemy' });
    els.nextRound.onclick = nextRound;

    // ===================================================================
    //  预设默认房间
    // ===================================================================
    const PRESET_ROOMS = [
        { code: '100001', label: '新手练习场' },
        { code: '100002', label: '老手对决场' },
        { code: '100003', label: '休闲聊天场' },
        { code: '100004', label: '高手切磋场' },
    ];

    const presetGrid = document.getElementById('preset-grid');
    const presetStatuses = {};

    function initPresetRooms() {
        PRESET_ROOMS.forEach(room => {
            presetStatuses[room.code] = 'empty';
            const card = document.createElement('div');
            card.className = 'preset-card';
            card.dataset.code = room.code;
            card.innerHTML = `
                <div class="room-num">${room.code}</div>
                <div class="room-label">${room.label}</div>
                <div class="room-status"><span class="dot empty"></span><span class="status-label">空闲</span></div>
            `;
            card.onclick = () => joinOrCreate(room.code);
            presetGrid.appendChild(card);
        });
    }

    function updatePresetStatus(code, status) {
        presetStatuses[code] = status;
        const card = presetGrid.querySelector(`[data-code="${code}"]`);
        if (!card) return;
        const dot = card.querySelector('.dot');
        const label = card.querySelector('.status-label');
        if (status === 'empty') { dot.className = 'dot empty'; label.textContent = '空闲'; }
        else if (status === 'waiting') { dot.className = 'dot active'; label.textContent = '有人等待'; }
        else if (status === 'playing') { dot.className = 'dot active'; label.textContent = '对局中'; }
    }

    function joinOrCreate(code) {
        if (connected) return;
        destroyPeer();
        addLog(`正在尝试进入房间 ${code}...`, 'info-text');
        updatePresetStatus(code, 'waiting');

        let joined = false;
        let tried = false;

        peer = new Peer(undefined, { debug: 0 });
        peer.on('open', () => {
            // 先尝试加入（当 guest）
            const connection = peer.connect(PREFIX + code, { reliable: true });

            const timeout = setTimeout(() => {
                if (!joined && !tried) {
                    // 加入失败，没人，自己当房主
                    tried = true;
                    peer.destroy();
                    peer = null;
                    createRoomWithCode(code);
                }
            }, 3500);

            connection.on('open', () => {
                clearTimeout(timeout);
                joined = true;
                role = 'guest'; mySeat = 'p2';
                bindConnection(connection);
                addLog(`已加入房间 ${code}`, 'success-text');
                updatePresetStatus(code, 'playing');
            });
            connection.on('error', () => {
                clearTimeout(timeout);
                if (!joined && !tried) {
                    tried = true;
                    peer.destroy(); peer = null;
                    createRoomWithCode(code);
                }
            });
        });
        peer.on('error', err => {
            if (!joined && !tried) {
                tried = true;
                if (peer) { peer.destroy(); peer = null; }
                createRoomWithCode(code);
            }
        });
    }

    function createRoomWithCode(code) {
        destroyPeer();
        role = 'host'; mySeat = 'p1';
        updatePresetStatus(code, 'waiting');

        els.roomRow.style.display = 'none';
        els.waitingArea.style.display = 'block';
        els.displayCode.textContent = code;
        els.connectStatus.innerHTML = '<span class="status-dot waiting"></span>等待对方加入...';

        peer = new Peer(PREFIX + code, { debug: 0 });
        peer.on('open', () => addLog(`房间 ${code} 已创建，等待对手`, 'info-text'));
        peer.on('connection', connection => {
            bindConnection(connection);
            els.connectStatus.innerHTML = '<span class="status-dot ok"></span>对方已加入，正在连接...';
            updatePresetStatus(code, 'playing');
        });
        peer.on('error', err => {
            addLog(`房间错误：${err.type}`, 'danger-text');
            updatePresetStatus(code, 'empty');
        });
    }

    initPresetRooms();
    addLog('双方输入同一个 6 位房间码即可联机，无需复制长串代码。', 'highlight');
</script>
</body>
</html>
