<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小游戏合集 · 入口</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 20% 10%, rgba(255, 204, 0, .08), transparent 28%),
                radial-gradient(circle at 80% 20%, rgba(68, 170, 255, .08), transparent 30%),
                #0a0a0a;
            color: #ddd;
            font-family: "Courier New", monospace;
            padding: 28px;
            line-height: 1.6;
        }
        .shell {
            max-width: 1120px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin: 18px 0 30px;
        }
        h1 {
            color: #ffcc00;
            font-size: clamp(30px, 6vw, 54px);
            letter-spacing: 6px;
            text-shadow: 0 0 22px rgba(255, 204, 0, .18);
        }
        .subtitle {
            color: #888;
            margin-top: 8px;
            font-size: 15px;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
            gap: 12px;
            margin-bottom: 22px;
        }
        .stat {
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px 16px;
            box-shadow: 0 0 22px rgba(0,0,0,.45);
        }
        .stat strong {
            display: block;
            color: #ffcc00;
            font-size: 24px;
        }
        .stat span {
            color: #888;
            font-size: 13px;
        }
        .section-title {
            color: #eee;
            margin: 20px 0 12px;
            font-size: 20px;
            letter-spacing: 2px;
        }
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 14px;
        }
        .game-card {
            position: relative;
            min-height: 180px;
            background: linear-gradient(145deg, #151515, #0f0f0f);
            border: 1px solid #333;
            border-radius: 16px;
            padding: 18px;
            overflow: hidden;
            box-shadow: 0 0 26px rgba(0,0,0,.55);
            transition: transform .18s, border-color .18s, box-shadow .18s;
        }
        .game-card::before {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(120deg, transparent, rgba(255,255,255,.05), transparent);
            transform: translateX(-120%);
            transition: transform .5s;
        }
        .game-card:hover::before {
            transform: translateX(120%);
        }
        .game-card.enabled {
            cursor: pointer;
            border-color: #665522;
        }
        .game-card.enabled:hover {
            transform: translateY(-4px);
            border-color: #ffcc00;
            box-shadow: 0 0 28px rgba(255,204,0,.14);
        }
        .game-card.locked {
            opacity: .58;
            filter: grayscale(.45);
        }
        .tag {
            display: inline-block;
            color: #88ccff;
            border: 1px solid #335577;
            border-radius: 999px;
            padding: 3px 9px;
            font-size: 12px;
            margin-bottom: 12px;
            background: rgba(68,170,255,.08);
        }
        .tag.soon {
            color: #888;
            border-color: #444;
            background: rgba(255,255,255,.04);
        }
        .game-card h2 {
            color: #ffcc00;
            font-size: 22px;
            margin-bottom: 8px;
        }
        .game-card p {
            color: #aaa;
            font-size: 14px;
        }
        .play-line {
            position: absolute;
            left: 18px;
            right: 18px;
            bottom: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #ddd;
            font-size: 13px;
        }
        .arrow {
            color: #ffcc00;
            font-size: 20px;
        }
        .placeholder-icon {
            position: absolute;
            right: 18px;
            bottom: 12px;
            color: rgba(255,255,255,.08);
            font-size: 48px;
            font-weight: 900;
        }
        footer {
            margin-top: 28px;
            color: #666;
            text-align: center;
            font-size: 13px;
        }
        @media (max-width: 560px) {
            body {
                padding: 18px;
            }
            h1 {
                letter-spacing: 3px;
            }
        }
    </style>
</head>
<body>
    <main class="shell">
        <header>
            <h1>小游戏合集</h1>
            <div class="subtitle">这里是开始界面。以后所有游戏都从这里进入。</div>
        </header>

        <section class="stats">
            <div class="stat">
                <strong>1</strong>
                <span>已加入游戏</span>
            </div>
            <div class="stat">
                <strong>60+</strong>
                <span>未来计划槽位</span>
            </div>
            <div class="stat">
                <strong>HTML</strong>
                <span>GitHub Pages 静态托管</span>
            </div>
        </section>

        <h2 class="section-title">选择游戏</h2>
        <section class="game-grid" id="game-grid">
            <article class="game-card enabled" onclick="location.href='./01/2026.06.20-7:14/game-buckshot.html'">
                <span class="tag">第 1 个游戏</span>
                <h2>恶魔轮盘赌</h2>
                <p>数学老师特供版。包含普通模式、无限模式、联机模式入口，以及娱乐用人机验证。</p>
                <div class="play-line">
                    <span>点击开始</span>
                    <span class="arrow">→</span>
                </div>
            </article>
        </section>

        <h2 class="section-title">开发中</h2>
        <section class="game-grid" id="future-grid"></section>

        <footer>后续新增游戏时，只要继续往这个首页加卡片即可。</footer>
    </main>

    <script>
        const futureGrid = document.getElementById('future-grid');
        const futureCount = 12;

        for (let i = 2; i < 2 + futureCount; i++) {
            const card = document.createElement('article');
            card.className = 'game-card locked';
            card.innerHTML = `
                <span class="tag soon">预留槽位</span>
                <h2>游戏 ${String(i).padStart(2, '0')}</h2>
                <p>这个位置留给之后的新游戏。当前还没有制作。</p>
                <div class="placeholder-icon">${String(i).padStart(2, '0')}</div>
                <div class="play-line"><span>目前未开放</span><span>---</span></div>
            `;
            futureGrid.appendChild(card);
        }
    </script>
</body>
</html>
